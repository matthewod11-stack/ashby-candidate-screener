[pytest]
# Put the repo root on sys.path so tests can `import state`, `import stages.*`,
# etc. regardless of how pytest is invoked. Without this, only `python -m pytest`
# works (it adds CWD to sys.path); the bare `pytest` console script — which CI
# and many contributors use — does not, and collection fails with ModuleNotFound.
pythonpath = .
testpaths = tests
